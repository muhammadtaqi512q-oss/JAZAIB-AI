<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER AI | Sky Blue Edition</title>
    <style>
        :root {
            --accent: #00d4ff; /* Sky Blue */
            --bg: #020c1b;
            --glass: rgba(0, 212, 255, 0.05);
            --border: rgba(0, 212, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            position: relative;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ai-container {
            width: 480px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.1);
            z-index: 10;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 {
            font-size: 28px;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
            text-transform: uppercase;
        }

        #chatBox {
            height: 320px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 10px;
            scrollbar-width: none;
        }

        .message {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .ai-msg { 
             background: rgba(0, 212, 255, 0.1); 
             border-color: var(--border);
             color: #e0f7ff;
        }

        .user-msg { 
             background: rgba(255, 255, 255, 0.05); 
             text-align: right; 
             margin-left: 40px;
             color: #fff;
        }

        .input-area {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 5px;
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: var(--accent);
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent);
        }

        button:hover { filter: brightness(1.2); transform: scale(1.02); }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ai-container">
    <div class="header">
        <h1>AETHER AI</h1>
        <p style="font-size: 9px; color: var(--accent); opacity: 0.7;">AETHER NEURAL ENGINE</p>
    </div>

    <div id="chatBox">
        <div class="message ai-msg">System Online. Connecting to GitHub Node...</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Inquire knowledge...">
        <button onclick="window.askAether ? askAether() : alert('System Booting, Please wait...')">SEND</button>
    </div>
</div>

<script>
    // GitHub Raw Link jahan se README file ka text load hoga
    const readmeRawUrl = "[https://raw.githubusercontent.com/muhammadtaqi512q-oss/JAZAIB-AI/main/README.md](https://raw.githubusercontent.com/muhammadtaqi512q-oss/JAZAIB-AI/main/README.md)";

    async function loadRemoteLogic() {
        const chatBox = document.getElementById('chatBox');
        try {
            const response = await fetch(readmeRawUrl);
            if (!response.ok) throw new Error("Network response was not ok");
            
            const jsCode = await response.text();

            // Dynamic script generate karke head mein inject karna
            const script = document.createElement('script');
            script.text = jsCode;
            document.head.appendChild(script);

            // UI update jab logic successfully load ho jaye
            chatBox.innerHTML = '<div class="message ai-msg">System Online. Search anything or talk to AI...</div>';
        } catch (error) {
            console.error("Failed to load AI brain:", error);
            chatBox.innerHTML = '<div class="message ai-msg" style="color: #ff4a4a;">Error: Failed to fetch AI Brain from core repo.</div>';
        }
    }

    // Page load hote hi GitHub se script pull karein
    window.addEventListener('DOMContentLoaded', loadRemoteLogic);
</script>
</body>
</html>
